<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Shivraj HMS</title>
<style>
body{font-family:Arial;background:#f4f6f9;margin:0}
header{background:#0d6efd;color:white;padding:15px;text-align:center}
.container{padding:20px}
.card{background:white;padding:15px;border-radius:10px;box-shadow:0 2px 6px rgba(0,0,0,0.1);margin-bottom:15px}
input,button,select{padding:10px;margin:5px 0;width:100%}
button{background:#0d6efd;color:white;border:none;cursor:pointer;border-radius:5px}
button:hover{background:#084298}
.nav{display:flex;gap:10px;flex-wrap:wrap}
.nav button{flex:1}
.hidden{display:none}
</style>
</head>
<body>

<header>
<h2>Shivraj Hospital Management System</h2>
</header>

<div class="container">

<!-- LOGIN -->
<div id="loginPage" class="card">
<h3>Login</h3>
<input id="user" placeholder="Username" />
<input id="pass" type="password" placeholder="Password" />
<button onclick="login()">Login</button>
<p id="err" style="color:red"></p>
</div>

<!-- DASHBOARD -->
<div id="app" class="hidden">
<div class="nav">
<button onclick="show('billing')">Billing</button>
<button onclick="show('inventory')">Inventory</button>
<button onclick="show('token')">OPD Token</button>
<button onclick="logout()">Logout</button>
</div>

<!-- BILLING -->
<div id="billing" class="card">
<h3>Billing System</h3>
<input id="pname" placeholder="Patient Name" />
<input id="amt" type="number" placeholder="Amount" />
<button onclick="addBill()">Generate Bill</button>
<div id="billList"></div>
</div>

<!-- INVENTORY -->
<div id="inventory" class="card hidden">
<h3>Inventory</h3>
<input id="item" placeholder="Item Name" />
<input id="qty" type="number" placeholder="Quantity" />
<button onclick="addItem()">Add Stock</button>
<div id="stockList"></div>
</div>

<!-- TOKEN -->
<div id="token" class="card hidden">
<h3>OPD Token</h3>
<select id="dept">
<option>GENERAL OPD</option>
<option>ANC OPD</option>
<option>ENT</option>
<option>DERMATOLOGY</option>
<option>PEDIATRIC</option>
<option>ORTHOPEDIC</option>
<option>GYNE & OBS</option>
<option>PSYCHIATRIC</option>
</select>
<button onclick="generateToken()">Generate Token</button>
<div id="tokenOut"></div>
</div>

</div>
</div>

<script>
let bills=[];
let stock=[];
let tokenNo=1;

function login(){
let u=document.getElementById('user').value;
let p=document.getElementById('pass').value;
if(u==='admin' && p==='admin'){
 document.getElementById('loginPage').classList.add('hidden');
 document.getElementById('app').classList.remove('hidden');
}else{
 document.getElementById('err').innerText='Invalid login';
}
}

function logout(){location.reload();}

function show(id){
document.querySelectorAll('.card').forEach(c=>c.classList.add('hidden'));
document.getElementById(id).classList.remove('hidden');
}

function addBill(){
let n=document.getElementById('pname').value;
let a=document.getElementById('amt').value;
bills.push({n,a});
renderBills();
}

function renderBills(){
document.getElementById('billList').innerHTML=bills.map(b=>
`<p>${b.n} - Rs ${b.a}</p>`).join('');
}

function addItem(){
let i=document.getElementById('item').value;
let q=document.getElementById('qty').value;
stock.push({i,q});
renderStock();
}

function renderStock(){
document.getElementById('stockList').innerHTML=stock.map(s=>
`<p>${s.i} - ${s.q}</p>`).join('');
}

function generateToken(){
let d=document.getElementById('dept').value;
document.getElementById('tokenOut').innerHTML=
`<h2>Token #${tokenNo++}</h2><p>${d}</p><p>Proceed to Doctor Room</p>`;
}
</script>

</body>
</html>
